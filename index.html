<!DOCTYPE html>
<html lang="zxx">
<head>
	<title>Crew Store | Games Catalog</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="css/bootstrap.min.css"/>
	<link rel="stylesheet" href="css/font-awesome.min.css"/>
	<link rel="stylesheet" href="css/slicknav.min.css"/>
	<link rel="stylesheet" href="css/owl.carousel.min.css"/>
	<link rel="stylesheet" href="css/style.css"/>

	<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0/papaparse.min.js"></script>

	<style>
		.game-card {
			background: #15102e;
			padding: 15px;
			border-radius: 5px;
			margin-bottom: 30px;
			border: 1px solid #2a215a;
			transition: 0.3s;
		}
		.game-card:hover { border-color: #ffb320; }
		.game-card img { width: 100%; height: 260px; object-fit: cover; border-radius: 4px; }
		.game-info { padding-top: 15px; }
		.game-info h4 { color: white; font-size: 16px; margin-bottom: 10px; height: 40px; overflow: hidden; }
		.game-price { color: #ffb320; font-weight: bold; font-size: 18px; display: block; margin-bottom: 15px; }
		.site-btn.btn-sm { padding: 10px 15px; font-size: 12px; width: 100%; text-align: center; }
		#gameGrid { min-height: 400px; }
	</style>
</head>
<body>
	<div id="preloder"><div class="loader"></div></div>

	<header class="header-section">
		<div class="header-warp">
			<div class="header-bar-warp d-flex">
				<a href="index.html" class="site-logo">
					<h3 style="color:white; font-weight: 900; margin-top: 10px;">CREW<span style="color:#ffb320">STORE</span></h3>
				</a>
				<nav class="top-nav-area w-100">
					<ul class="main-menu primary-menu">
						<li><a href="index.html">Home</a></li>
						<li><a href="games.html">Games</a></li>
						<li><a href="contact.html">Contact</a></li>
					</ul>
				</nav>
			</div>
		</div>
	</header>

	<section class="page-top-section set-bg" data-setbg="img/page-top-bg/1.jpg">
		<div class="page-info">
			<h2>Games Catalog</h2>
			<div class="site-breadcrumb">
				<span>Explore 5,000+ Titles</span>
			</div>
		</div>
	</section>

	<section class="games-section community-post-set">
		<div class="container">
			<div class="row">
				<div class="col-md-12 mb-5">
					<div class="widget-item">
						<form class="search-widget" onsubmit="return false;">
							<input type="text" id="mainSearch" placeholder="Type game name (e.g. Resident Evil)..." onkeyup="filterGames()">
							<button disabled><i class="fa fa-search"></i></button>
						</form>
					</div>
				</div>
			</div>
			
			<div class="row" id="gameGrid">
				</div>
		</div>
	</section>

	<footer class="footer-section">
		<div class="container text-center">
			<p class="copyright">CREW STORE &copy; 2026. All rights reserved.</p>
		</div>
	</footer>

	<script src="js/jquery-3.2.1.min.js"></script>
	<script src="js/main.js"></script>

	<script>
		let allGames = [];

		// Load the CSV
		Papa.parse("games.csv", {
			download: true,
			header: true,
			complete: function(results) {
				allGames = results.data.filter(row => row['game name']);
				renderGrid(allGames);
			}
		});

		function renderGrid(data) {
			const grid = document.getElementById('gameGrid');
			if (data.length === 0) {
				grid.innerHTML = '<div class="col-12 text-center"><h3>No games found.</h3></div>';
				return;
			}

			grid.innerHTML = data.map(game => {
				const waUrl = `https://wa.me/964000000000?text=${encodeURIComponent("I want to buy: " + game['game name'])}`;
				const img = game['image'] && game['image'].includes('http') ? game['image'] : 'img/game-placeholder.jpg';
				
				return `
					<div class="col-lg-3 col-md-4 col-sm-6">
						<div class="game-card">
							<img src="${img}" alt="">
							<div class="game-info">
								<h4>${game['game name']}</h4>
								<span class="game-price">${game['Price in dinar']}</span>
								<a href="${waUrl}" class="site-btn btn-sm">Buy Now</a>
							</div>
						</div>
					</div>
				`;
			}).join('');
		}

		function filterGames() {
			const query = document.getElementById('mainSearch').value.toLowerCase();
			const filtered = allGames.filter(g => g['game name'].toLowerCase().includes(query));
			renderGrid(filtered);
		}
	</script>
</body>
</html>
