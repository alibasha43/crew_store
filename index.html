<!DOCTYPE html>
<html lang="zxx">
<head>
	<title>Crew Store - Game Catalog</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	
	<link href="https://fonts.googleapis.com/css?family=Roboto:400,400i,500,500i,700,700i,900,900i" rel="stylesheet">

	<link rel="stylesheet" href="css/bootstrap.min.css"/>
	<link rel="stylesheet" href="css/font-awesome.min.css"/>
	<link rel="stylesheet" href="css/style.css"/>

	<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0/papaparse.min.js"></script>

	<style>
		/* Fix for the grid to look like a shop */
		#gameGrid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
			gap: 20px;
		}
		.game-item {
			background: #15102e;
			padding: 15px;
			border-radius: 5px;
			border-bottom: 2px solid #ffb320;
			margin-bottom: 20px;
		}
		.game-thumb {
			width: 100%;
			height: 250px;
			object-fit: cover;
			border-radius: 3px;
		}
		.game-price {
			color: #ffb320;
			font-weight: bold;
			font-size: 18px;
			display: block;
			margin: 10px 0;
		}
		.order-btn {
			display: inline-block;
			padding: 10px 20px;
			background: #ffb320;
			color: #000;
			font-weight: bold;
			text-transform: uppercase;
			font-size: 12px;
			border-radius: 2px;
		}
	</style>
</head>
<body>
	<div id="preloder">
		<div class="loader"></div>
	</div>

	<header class="header-section">
		<div class="header-warp">
			<div class="header-bar-warp d-flex">
				<a href="index.html" class="site-logo">
					<h3 style="color:white; font-weight: 900; margin-top: 10px;">CREW<span style="color:#ffb320">STORE</span></h3>
				</a>
				<nav class="top-nav-area w-100">
					<ul class="main-menu primary-menu">
						<li><a href="index.html">Home</a></li>
						<li><a href="#">Games</a></li>
						<li><a href="#">Contact</a></li>
					</ul>
				</nav>
			</div>
		</div>
	</header>

	<section class="page-top-section set-bg" style="background-image: url('img/page-top-bg/3.jpg');">
		<div class="page-info">
			<h2>Game Catalog</h2>
			<div class="site-breadcrumb">
				<span>5,000+ Items Available</span>
			</div>
		</div>
	</section>

	<section class="blog-page">
		<div class="container">
			<div class="row">
				<div class="col-xl-9 col-lg-8">
					<ul class="blog-filter">
						<li><a href="#" onclick="searchCategory('')">All</a></li>
						<li><a href="#" onclick="searchCategory('PS5')">PS5</a></li>
						<li><a href="#" onclick="searchCategory('PS4')">PS4</a></li>
					</ul>
					
					<div id="gameGrid">
						</div>
				</div>

				<div class="col-xl-3 col-lg-4 sidebar">
					<div class="widget-item">
						<div class="search-widget">
							<input type="text" id="gameSearch" placeholder="Search game..." onkeyup="filterGames()">
						</div>
					</div>
					<div class="widget-item">
						<h4 class="widget-title">Need Help?</h4>
						<p style="color: #b7b7b7;">Contact our team on WhatsApp for instant manual delivery in Iraq.</p>
						<a href="https://wa.me/964000000000" class="order-btn">Chat with us</a>
					</div>
				</div>
			</div>
		</div>
	</section>

	<footer class="footer-section">
		<div class="container text-center">
			<p class="copyright">CREW STORE 2026 @ All rights reserved</p>
		</div>
	</footer>

	<script src="js/jquery-3.2.1.min.js"></script>
	<script src="js/main.js"></script>

	<script>
		let gamesData = [];

		// Load CSV
		Papa.parse("games.csv", {
			download: true,
			header: true,
			complete: function(results) {
				gamesData = results.data.filter(row => row['game name']);
				displayGames(gamesData);
			}
		});

		function displayGames(games) {
			const grid = document.getElementById('gameGrid');
			grid.innerHTML = games.map(game => {
				const imgUrl = game['image'] && game['image'].includes('http') ? game['image'] : 'img/blog-big/1.jpg';
				const waMsg = encodeURIComponent("Hello Crew Store, I want to buy: " + game['game name']);
				
				return `
					<div class="game-item">
						<img src="${imgUrl}" class="game-thumb" alt="game">
						<div style="margin-top:15px;">
							<h4 style="color:white; font-size: 16px;">${game['game name']}</h4>
							<span class="game-price">${game['Price in dinar']}</span>
							<a href="https://wa.me/964000000000?text=${waMsg}" class="order-btn">Order Now</a>
						</div>
					</div>
				`;
			}).join('');
		}

		function filterGames() {
			const term = document.getElementById('gameSearch').value.toLowerCase();
			const filtered = gamesData.filter(g => g['game name'].toLowerCase().includes(term));
			displayGames(filtered);
		}

		function searchCategory(cat) {
			const filtered = gamesData.filter(g => g['game name'].toLowerCase().includes(cat.toLowerCase()));
			displayGames(filtered);
		}
	</script>
</body>
</html>
