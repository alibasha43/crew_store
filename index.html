<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crew Store | God Mode</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    margin:0;
    font-family: 'Plus Jakarta Sans', sans-serif;
    overflow-x:hidden;
    background:black;
}

/* BACKGROUND */
.bg-layer {
    position: fixed;
    inset:0;
    z-index:-3;
}
.bg-layer img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter: blur(4px) brightness(0.4);
    transform: scale(1.1);
}

/* FOG */
.fog {
    position: fixed;
    inset:0;
    background: radial-gradient(circle at 50% 50%, transparent, black 80%);
    z-index:-2;
}

/* PARTICLES */
canvas {
    position: fixed;
    inset:0;
    z-index:-1;
}

/* HERO */
.hero {
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
}

.kratos {
    width:900px;
    max-width:95%;
    filter: drop-shadow(0 50px 120px rgba(0,0,0,1));
    transition:0.6s;
}

.hero:hover .kratos {
    transform: scale(1.05) translateY(-10px);
}

/* GLOW */
.glow {
    position:absolute;
    width:600px;
    height:600px;
    background: radial-gradient(circle, rgba(59,130,246,0.4), transparent);
    filter: blur(120px);
    z-index:-1;
}

/* GLASS */
.glass {
    margin-top:-120px;
    padding:60px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(40px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:30px;
    text-align:center;
    max-width:800px;
}

/* TEXT */
h1 {
    font-size:100px;
    font-weight:900;
    color:white;
}

/* BUTTON */
.btn {
    margin-top:30px;
    padding:18px 50px;
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    border-radius:12px;
    font-weight:800;
    letter-spacing:2px;
    color:white;
    box-shadow:0 0 40px rgba(59,130,246,0.6);
    transition:0.3s;
}

.btn:hover{
    transform: translateY(-5px) scale(1.05);
    box-shadow:0 0 80px rgba(59,130,246,1);
}

</style>
</head>
<body>

<!-- BACKGROUND -->
<div class="bg-layer">
<img src="https://www.image2url.com/r2/default/images/1776157434300-bdce2c6e-256c-4b2a-a577-ee45d7a751af.jpg">
</div>

<div class="fog"></div>
<canvas id="particles"></canvas>

<!-- HERO -->
<section class="hero">

<div class="glow"></div>

<img class="kratos" src="https://www.image2url.com/r2/default/images/1776155563318-bd6675a4-7b08-4853-9fdf-aed6e7d56d20.png">

<div class="glass">
<h1>CREWSTORE</h1>
<p style="color:#aaa;margin-top:10px;">Enter the realm of gods. Power. Chaos. Control.</p>

<button class="btn">ENTER STORE</button>
</div>

</section>

<script>
// PARTICLES ENGINE
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<120;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        d:Math.random()*1
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.beginPath();

    for(let i=0;i<particles.length;i++){
        let p = particles[i];
        ctx.moveTo(p.x,p.y);
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
    }

    ctx.fill();
    update();
}

function update(){
    for(let i=0;i<particles.length;i++){
        let p = particles[i];
        p.y -= p.d;
        if(p.y < 0){
            p.y = canvas.height;
        }
    }
}

setInterval(draw,30);

// PARALLAX
window.addEventListener('mousemove', e => {
    let x = (e.clientX / window.innerWidth - 0.5) * 20;
    let y = (e.clientY / window.innerHeight - 0.5) * 20;
    document.querySelector('.kratos').style.transform = `translate(${x}px, ${y}px) scale(1.05)`;
});
</script>

</body>
</html>
