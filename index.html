<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crew Store | Game Catalog</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0/papaparse.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --whatsapp: #25d366;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent);
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .search-container {
            position: sticky;
            top: 10px;
            z-index: 100;
            margin-bottom: 30px;
        }

        .search-box {
            width: 100%;
            padding: 16px 20px;
            border-radius: 15px;
            border: 1px solid #334155;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 1.1rem;
            outline: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #334155;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .card img {
            width: 100%;
            height: 210px;
            object-fit: cover;
            border-radius: 8px;
            background: #000;
        }

        .game-info {
            margin-top: 12px;
            flex-grow: 1;
        }

        .game-title {
            font-size: 0.95rem;
            font-weight: 600;
            height: 40px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            margin-bottom: 8px;
        }

        .price {
            color: var(--accent);
            font-size: 1.1rem;
            font-weight: 800;
        }

        .buy-btn {
            background: var(--whatsapp);
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
            font-size: 0.85rem;
            transition: opacity 0.2s;
        }

        .buy-btn:hover {
            opacity: 0.9;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .card { padding: 8px; }
            .card img { height: 180px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>CREW STORE</h1>
            <p>Your search for 5,000+ games ends here.</p>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-box" placeholder="Search by game name..." onkeyup="searchGames()">
        </div>

        <div class="grid" id="gameGrid">
            </div>
    </div>

    <script>
        let gamesData = [];

        // 1. Fetch the CSV (must be named games.csv and in the same GitHub folder)
        Papa.parse("games.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                // Ensure we filter out empty rows and use your specific "game name" header
                gamesData = results.data.filter(row => row['game name']);
                displayGames(gamesData);
            }
        });

        function displayGames(games) {
            const grid = document.getElementById('gameGrid');
            if (games.length === 0) {
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center;'>No games found matching that search.</p>";
                return;
            }
            
            grid.innerHTML = games.map(game => {
                // Image Handling: If Column 'image' is empty, it uses a placeholder.
                const imgSource = game['image'] && game['image'].startsWith('http') 
                    ? game['image'] 
                    : 'https://via.placeholder.com/300x400/1e293b/38bdf8?text=NO+IMAGE';

                // WhatsApp Link Setup
                // Replace 0000000 with your actual phone number
                const message = encodeURIComponent("Hello Crew Store, I want to buy: " + game['game name']);
                const whatsappLink = `https://wa.me/964000000000?text=${message}`;

                return `
                <div class="card">
                    <img src="${imgSource}" loading="lazy" alt="Cover">
                    <div class="game-info">
                        <div class="game-title">${game['game name']}</div>
                        <div class="price">${game['Price in dinar'] || 'Call for Price'}</div>
                    </div>
                    <a href="${whatsappLink}" class="buy-btn">ORDER VIA WHATSAPP</a>
                </div>
                `;
            }).join('');
        }

        function searchGames() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = gamesData.filter(g => 
                g['game name'].toLowerCase().includes(term)
            );
            displayGames(filtered);
        }
    </script>
</body>
</html>
