<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crew Store | Premium Gaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* CHANGE BACKGROUND IMAGE HERE */
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2070');
            background-size: cover;
            background-attachment: fixed;
            color: #fff;
        }

        .glass {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .neon-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        
        /* Dropdown styling */
        .dropdown:hover .dropdown-menu { display: block; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 glass border-b border-white/10">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showPage('home')">
                <img src="YOUR_LOGO_URL_HERE" alt="Logo" class="h-10 w-10 object-contain">
                <span class="text-2xl font-black tracking-tighter">CREW<span class="text-blue-500">STORE</span></span>
            </div>

            <div class="hidden lg:flex gap-8 font-bold text-xs uppercase tracking-widest">
                <a href="#" onclick="showPage('home')" class="hover:text-blue-500 transition">Home</a>
                
                <div class="relative dropdown">
                    <button class="hover:text-blue-500 flex items-center gap-1">Games <i data-lucide="chevron-down" class="w-4 h-4"></i></button>
                    <div class="dropdown-menu hidden absolute bg-black border border-white/10 p-4 w-48 mt-2 rounded-xl">
                        <a href="#" onclick="filterSheet('PlayStation')" class="block py-2 hover:text-blue-500">PlayStation</a>
                        <a href="#" onclick="filterSheet('Xbox')" class="block py-2 hover:text-blue-500">Xbox</a>
                        <a href="#" onclick="filterSheet('Steam')" class="block py-2 hover:text-blue-500">Steam</a>
                    </div>
                </div>

                <div class="relative dropdown">
                    <button class="hover:text-blue-500 flex items-center gap-1">Subscriptions <i data-lucide="chevron-down" class="w-4 h-4"></i></button>
                    <div class="dropdown-menu hidden absolute bg-black border border-white/10 p-4 w-48 mt-2 rounded-xl">
                        <a href="#" onclick="filterSheet('Subscriptions', 'PSN')" class="block py-2">PS Plus</a>
                        <a href="#" onclick="filterSheet('Subscriptions', 'Xbox')" class="block py-2">Game Pass</a>
                    </div>
                </div>

                <div class="relative dropdown">
                    <button class="hover:text-blue-500 flex items-center gap-1">Gift Cards <i data-lucide="chevron-down" class="w-4 h-4"></i></button>
                    <div class="dropdown-menu hidden absolute bg-black border border-white/10 p-4 w-48 mt-2 rounded-xl">
                        <a href="#" onclick="filterSheet('GiftCards', 'Steam')" class="block py-2">Steam</a>
                        <a href="#" onclick="filterSheet('GiftCards', 'PSN')" class="block py-2">PSN Cards</a>
                    </div>
                </div>
            </div>

            <div class="relative w-64">
                <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-gray-400"></i>
                <input type="text" id="mainSearch" onkeyup="searchProducts()" placeholder="Search products..." class="w-full bg-white/5 border border-white/10 rounded-full py-2 pl-10 pr-4 focus:outline-none focus:border-blue-500 text-sm">
            </div>
        </div>
    </nav>

    <div id="content" class="pt-32">
        <div id="home-view" class="max-w-7xl mx-auto px-6 text-center py-20">
            <h1 id="hero-title" class="text-6xl md:text-8xl font-black mb-6 tracking-tight uppercase">
                YOUR <span class="text-blue-500">FAVORITE</span><br>GAMES
            </h1>
            <p class="text-gray-400 text-xl mb-10">Select a category above to browse our latest stock.</p>
        </div>

        <div id="product-view" class="max-w-7xl mx-auto px-6 hidden">
            <h2 id="category-title" class="text-3xl font-black mb-10 uppercase italic">Products</h2>
            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                </div>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const SHEET_ID = '1AGvTOYX5qXX3ezaku0rwTbQ0TkxBvCEH7QZHCfjNuU8';
        const WHATSAPP_NUMBER = '964000000000';

        async function fetchSheetData(tabName) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${tabName}`;
            const response = await fetch(url);
            const data = await response.text();
            return parseCSV(data);
        }

        function parseCSV(csv) {
            const lines = csv.split('\n');
            const result = [];
            const headers = lines[0].split(',');
            for (let i = 1; i < lines.length; i++) {
                const obj = {};
                const currentline = lines[i].split(',');
                headers.forEach((h, index) => {
                    obj[h.replace(/"/g, '').trim()] = currentline[index]?.replace(/"/g, '').trim();
                });
                result.push(obj);
            }
            return result;
        }

        async function filterSheet(tab, filterVal = '') {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('product-view').classList.remove('hidden');
            document.getElementById('category-title').innerText = tab;
            
            const products = await fetchSheetData(tab);
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '<p class="text-blue-500">Loading Armory...</p>';

            const filtered = filterVal ? products.filter(p => p.Platform === filterVal) : products;

            grid.innerHTML = filtered.map(p => `
                <div class="glass p-4 rounded-2xl border border-white/5 hover:border-blue-500 transition group">
                    <img src="${p.ImageURL}" class="w-full h-48 object-cover rounded-xl mb-4 group-hover:scale-105 transition">
                    <h3 class="font-bold text-lg">${p.Name}</h3>
                    <div class="flex justify-between items-center mt-4">
                        <span class="text-xl font-black text-blue-400">$${p.Price}</span>
                        <a href="https://wa.me/${WHATSAPP_NUMBER}?text=I want to buy ${p.Name}" class="bg-blue-600 p-2 rounded-lg"><i data-lucide="shopping-cart" class="w-5 h-5"></i></a>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function searchProducts() {
            let input = document.getElementById('mainSearch').value.toLowerCase();
            let cards = document.querySelectorAll('#product-grid > div');
            cards.forEach(card => {
                let name = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = name.includes(input) ? 'block' : 'none';
            });
        }

        function showPage(page) {
            if(page === 'home') {
                document.getElementById('home-view').classList.remove('hidden');
                document.getElementById('product-view').classList.add('hidden');
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>
